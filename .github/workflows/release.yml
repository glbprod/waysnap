name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build aarch64 & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build aarch64 release
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          cp target/aarch64-unknown-linux-gnu/release/waysnap waysnap-aarch64
          sha256sum waysnap-aarch64 > waysnap-aarch64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            waysnap-aarch64
            waysnap-aarch64.sha256
          body: |
            ## Installation (Raspberry Pi / aarch64)

            ```sh
            # Download
            curl -LO https://github.com/glbprod/waysnap/releases/latest/download/waysnap-aarch64

            # Verify checksum (optional)
            curl -LO https://github.com/glbprod/waysnap/releases/latest/download/waysnap-aarch64.sha256
            sha256sum -c waysnap-aarch64.sha256

            # Install
            chmod +x waysnap-aarch64
            mv waysnap-aarch64 ~/.local/bin/waysnap

            # Run
            waysnap install
            ```
